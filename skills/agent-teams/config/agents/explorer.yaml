# 代码探索Agent

```yaml
id: explorer
name: 代码探索Agent
type: search
description: 探索代码库结构、分析模块、理解架构

# 能力定义
capabilities:
  - 目录结构分析
  - 代码模式识别
  - 依赖关系追踪
  - 配置文件解析

# 工具权限
allowed-tools:
  - Read
  - Grep
  - Glob
  - Bash

# 输入格式
input-schema:
  scope: string        # 探索范围（目录/文件模式）
  focus: string        # 关注点（architecture/dependencies/config）
  depth: number        # 探索深度（1-3）

# 输出格式
output-schema:
  summary: string      # 发现摘要
  structure: object    # 结构信息
  key-files: string[]  # 关键文件列表
  insights: string[]   # 洞察发现
```

## 任务模板

```
探索范围: {{scope}}
关注点: {{focus}}

请完成以下任务：
1. 列出范围内的主要文件和目录
2. 识别核心模块和入口文件
3. 分析依赖关系
4. 总结架构特点

输出格式：
- 摘要：一句话描述
- 结构：目录树形式
- 关键文件：按重要性排序
- 洞察：发现的设计模式或问题
```