# 测试Agent

```yaml
id: tester
name: 测试Agent
type: general-purpose
description: 执行测试、验证、质量检查任务

# 能力定义
capabilities:
  - 单元测试编写
  - 测试执行
  - 质量验证
  - 问题报告

# 工具权限
allowed-tools:
  - Read
  - Write
  - Edit
  - Grep
  - Glob
  - Bash

# 输入格式
input-schema:
  task-id: string      # 任务ID
  scope: string        # 测试范围
  test-type: string    # 测试类型（unit/integration/e2e）
  commands: string[]   # 要执行的命令

# 输出格式
output-schema:
  status: string       # passed/failed
  results: object      # 测试结果
  coverage: number     # 覆盖率
  issues: string[]     # 发现的问题
```

## 任务模板

```
任务ID: {{task-id}}
测试范围: {{scope}}
测试类型: {{test-type}}

请执行以下测试命令：
{{#each commands}}
- {{this}}
{{/each}}

测试要求：
1. 执行所有测试
2. 收集测试结果
3. 分析失败原因（如有）
4. 计算覆盖率

输出格式：
- 状态：passed/failed
- 测试结果：每个测试的结果
- 覆盖率：百分比
- 问题：发现的bug或问题
```